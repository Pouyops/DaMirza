<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Persian Word Finder</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        #status {
            font-size: 0.9em;
            color: #d35400;
            text-align: center;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            direction: rtl;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        button:hover:not(:disabled) {
            background-color: #3498db;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }
        li {
            background: #ecf0f1;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>واژه‌ساز فارسی</h2>
    <div id="status">در حال دانلود دیتابیس...</div>
    
    <input type="text" id="letterInput" placeholder="حروف را با فاصله وارد کنید (مثلا: ک ک ب)" disabled>
    <button id="findBtn" disabled>جستجوی کلمات</button>

    <ul id="resultsList"></ul>
</div>

<script>
    const DICT_URL = "https://raw.githubusercontent.com/jadijadi/persianwords/master/persian_dict_19k.txt";
    let persianDictionary = new Set();

    const statusEl = document.getElementById('status');
    const inputEl = document.getElementById('letterInput');
    const btnEl = document.getElementById('findBtn');
    const resultsEl = document.getElementById('resultsList');

    function normalizePersian(text) {
        return text.replace(/ك/g, 'ک').replace(/ي/g, 'ی');
    }

    async function loadDictionary() {
        try {
            const response = await fetch(DICT_URL);
            if (!response.ok) throw new Error("Network response was not ok");
            const text = await response.text();
            
            const words = text.split('\n');
            for (let word of words) {
                let trimmed = word.trim();
                if (trimmed) {
                    persianDictionary.add(normalizePersian(trimmed));
                }
            }
            
            statusEl.textContent = `دیتابیس آماده است (${persianDictionary.size} کلمه)`;
            statusEl.style.color = "green";
            inputEl.disabled = false;
            btnEl.disabled = false;
        } catch (error) {
            statusEl.textContent = "خطا در دانلود دیتابیس. لطفا اینترنت خود را بررسی کنید.";
            statusEl.style.color = "red";
        }
    }

    function getPermutations(letters) {
        let results = new Set();
        
        function permute(current, remaining) {
            if (current.length >= 3) {
                results.add(current);
            }
            if (remaining.length === 0) return;
            
            for (let i = 0; i < remaining.length; i++) {
                let nextRemaining = remaining.slice();
                nextRemaining.splice(i, 1);
                permute(current + remaining[i], nextRemaining);
            }
        }
        
        permute("", letters);
        return results;
    }

    btnEl.addEventListener('click', () => {
        resultsEl.innerHTML = "";
        
        const rawInput = inputEl.value;
        const letters = rawInput.trim().split(/\s+/).map(normalizePersian);
        
        if (letters.length < 3 || letters[0] === "") {
            statusEl.textContent = "لطفا حداقل ۳ حرف وارد کنید.";
            statusEl.style.color = "red";
            return;
        }

        statusEl.textContent = "در حال جستجو...";
        statusEl.style.color = "blue";

        setTimeout(() => {
            const possibleWords = getPermutations(letters);
            let validWords = [];

            for (let word of possibleWords) {
                if (persianDictionary.has(word)) {
                    validWords.push(word);
                }
            }

            validWords.sort((a, b) => {
                if (a.length !== b.length) {
                    return a.length - b.length;
                }
                return a.localeCompare(b, 'fa');
            });

            if (validWords.length === 0) {
                statusEl.textContent = "کلمه معناداری یافت نشد.";
                statusEl.style.color = "red";
            } else {
                statusEl.textContent = `${validWords.length} کلمه یافت شد.`;
                statusEl.style.color = "green";
                
                validWords.forEach(word => {
                    let li = document.createElement('li');
                    li.textContent = word;
                    resultsEl.appendChild(li);
                });
            }
        }, 50);
    });

    window.onload = loadDictionary;
</script>

</body>
</html>
